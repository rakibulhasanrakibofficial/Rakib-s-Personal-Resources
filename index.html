<!DOCTYPE html>
<html>
<head>
  <title>Rakib Resource Hub</title>
</head>
<body style="background:#0b132b; color:white; text-align:center; font-family:sans-serif;">

<h1>🚀 Rakib Resource Hub</h1>

<h2>Semester 3</h2>

<button onclick="loadData()">📂 Load Files</button>

<div id="output"></div>

<script>
function loadData(){
  fetch("https://rakib-s-personal-resources.onrender.com/files")
  .then(res => res.json())
  .then(data => {

    let html = "";

    Object.keys(data).forEach(key => {

      if(key.includes("sem3")){

        html += `
        <div style="margin:10px; padding:10px; border:1px solid white;">
          <p>${key}</p>
          <a href="https://t.me/Rakibspersonalresourcesbot?start=${key}" target="_blank">
            Download
          </a>
        </div>
        `;
      }

    });

    document.getElementById("output").innerHTML = html;

  });
}
</script>

</body>
</html>
