<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakib Resource Hub</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}

.card{
  background:#1e293b;
  padding:12px 18px;
  margin:10px;
  border-radius:12px;
  display:inline-flex;
  cursor:pointer;
}
.card:hover{background:#334155}

.file-card{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

.download-btn{
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🚀 Rakib Resource Hub</h2>

<div id="main">
  <div class="card" onclick="showAcademic()">🎓 Academic</div>
</div>

<div id="screen"></div>

<script>

function show(html){
  document.getElementById("main").style.display="none";
  document.getElementById("screen").innerHTML=html;
}

function home(){
  document.getElementById("main").style.display="block";
  document.getElementById("screen").innerHTML="";
}

function showAcademic(){
  let html="<h3>Semester</h3>";
  for(let i=1;i<=8;i++){
    html+=`<div class="card" onclick="openSem(${i})">Semester ${i}</div>`;
  }
  html+=`<button onclick="home()">Back</button>`;
  show(html);
}

function openSem(n){
  let html=`
  <h3>Semester ${n}</h3>

  <div class="card" onclick="openPrevious()">Previous Questions</div>

  <button onclick="showAcademic()">Back</button>
  `;
  show(html);
}

function openPrevious(){
  let html=`
  <h3>📂 Semester 3 - Previous Questions</h3>

  <div class="file-card">
    <h4>CHEM-2301</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_chem-2301-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <div class="file-card">
    <h4>CSE-2321</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_cse-2321-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <div class="file-card">
    <h4>CSE-2323</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_cse-2323-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <div class="file-card">
    <h4>MATH-2307</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_math-2307-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <div class="file-card">
    <h4>STAT-2311</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_stat-2311-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <div class="file-card">
    <h4>GEED-2302</h4>
    <button class="download-btn"
    onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=sem3_prev_geed-2302-mid-term-question','_blank')">
    📥 Download
    </button>
  </div>

  <button onclick="openSem(3)">⬅ Back</button>
  `;
  show(html);
}

</script>

</body>
</html>
