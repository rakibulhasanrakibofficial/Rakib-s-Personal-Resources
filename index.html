<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rakib Resource Hub</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}
.card{
  background:#1e293b;
  color:white;
  padding:12px 18px;
  margin:10px;
  border-radius:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:130px;
  white-space:nowrap;
  cursor:pointer;
}
.card:hover{background:#334155}
a{display:block;margin:6px;color:#38bdf8}
button{margin:10px;padding:6px 12px}
.file-card{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
  text-align:left;
}

.file-card h4{
  margin:5px 0;
}

.file-card p{
  font-size:12px;
  color:#94a3b8;
}

.download-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>

]

let currentSem=1;
let currentType="mid";

// ========= NAV =========
function show(html){
  document.getElementById("main").style.display="none";
  document.getElementById("screen").innerHTML=html;
}

function home(){
  paidUnlocked = false; // 👈 এই লাইন add
  document.getElementById("main").style.display="block";
  document.getElementById("screen").innerHTML="";
}
// ========= ACADEMIC =========
function showAcademic(){
  let html="<h3>Semester</h3>";
  for(let i=1;i<=8;i++){
    html+=`<div class="card" onclick="openSem(${i})">Semester ${i}</div>`;
  }
  html+=`<button onclick="home()">Back</button>`;
  show(html);
}

function openSem(n){
  currentSem=n;
  let html=`
  <h3>Semester ${n}</h3>

  <div class="card" onclick="openExam('mid')">Mid</div>
  <div class="card" onclick="openExam('final')">Final</div>
  <div class="card" onclick="openPreviousType()">Previous Question</div>
  <div class="card" onclick="openOther()">Other</div>

  <button onclick="showAcademic()">Back</button>
  `;
  show(html);
}
function openExam(type){
  currentType=type;
  let html=`<h3>${type.toUpperCase()} - Semester ${currentSem}</h3>`;
  semesters[currentSem].forEach(c=>{
    html+=`<div class="card" onclick="openCourse('${c}')">${c}</div>`;
  });
  html+=`<button onclick="openSem(${currentSem})">Back</button>`;
  show(html);
}



function openOther(){
  let html=`
  <h3>Other</h3>
  <a href="#">Routines</a>
  <a href="#">Lab Reports</a>
  <a href="#">Assignments</a>
  <a href="#">Cover Pages</a>
  <button onclick="openSem(${currentSem})">Back</button>
  `;
  show(html);
}
function openPreviousType(){
  let html=`
  <h3>Previous Questions</h3>

  <div class="card" onclick="openPrevious('mid')">Mid Previous</div>
  <div class="card" onclick="openPrevious('final')">Final Previous</div>

  <button onclick="openSem(${currentSem})">Back</button>
  `;
  show(html);
}

function openPrevious(type){
  let html = `<h3>📂 Semester ${currentSem} - ${type.toUpperCase()} Previous</h3>`;

  semesters[currentSem].forEach(course => {

    let subject = course.split(" ")[0].toLowerCase();

    let key = `sem${currentSem}/${type}/prev/${subject}`;

    html += `
    <div class="file-card">
      <h4>${course}</h4>
      <button class="download-btn"
      onclick="window.open('https://t.me/Rakibspersonalresourcesbot?start=${key}','_blank')">
      📥 Download
      </button>
    </div>
    `;
  });

  html += `<button onclick="openPreviousType()">⬅ Back</button>`;
  show(html);
}  

// ========= FREE =========
function showFree(){
  let html=`
  <h3>Free Courses</h3>
  <div class="card">Hard Skills</div>
  <div class="card">Soft Skills</div>
  <div class="card">IELTS</div>
  <button onclick="home()">Back</button>
  `;
  show(html);
}

// ========= PAID =========
function showPaid(){

  if(!paidUnlocked){
    let pass = prompt("Enter Password");
    if(pass !== "rakib123"){
      alert("Wrong Password");
      return;
    }
    paidUnlocked = true;
  }

  let html=`
  <h3>Paid Courses</h3>
  <div class="card" onclick="hardSkills()">Hard Skills</div>
  <div class="card" onclick="softSkills()">Soft Skills</div>
  <div class="card">Abroad</div>
  <button onclick="home()">Back</button>
  `;
  show(html);
}

// ========= HARD =========
function hardSkills(){
  let list=["Web Dev","App Dev","Data Science","AI/ML","Cyber Security"];
  let html="<h3>Hard Skills</h3>";
  list.forEach(s=>{
    html+=`<div class="card" onclick="openSource('${s}')">${s}</div>`;
  });
  html+=`<button onclick="showPaid()">Back</button>`;
  show(html);
}

// ========= SOFT =========
function softSkills(){
  let list=["Communication","Interview","CV","Leadership"];
  let html="<h3>Soft Skills</h3>";
  list.forEach(s=>{
    html+=`<div class="card" onclick="openSource('${s}')">${s}</div>`;
  });
  html+=`<button onclick="showPaid()">Back</button>`;
  show(html);
}

// ========= SOURCE (Accounts / Telegram) =========
function openSource(name){
  let html=`
  <h3>${name}</h3>
  <div class="card" onclick="platform('${name}','Accounts')">Accounts</div>
  <div class="card" onclick="platform('${name}','Telegram')">Telegram Courses</div>
  <button onclick="showPaid()">Back</button>
  `;
  show(html);
}

// ========= PLATFORM =========
function platform(name,type){
  let html=`
  <h3>${name} (${type})</h3>
  <div class="card">Ostad</div>
  <div class="card">Interactive Cares</div>
  <div class="card">10 Minute School</div>
  <button onclick="showPaid()">Back</button>
  `;
  show(html);
}
function openCourse(name){

  let subject = name.split(" ")[0].toLowerCase();

  let html=`
  <h3>${name}</h3>

  <div class="card"
  onclick="download('sem${currentSem}/${currentType}/question/${subject}')">
  📄 Question
  </div>

  <div class="card"
  onclick="download('sem${currentSem}/${currentType}/prev/${subject}')">
  📂 Previous
  </div>

  <div class="card"
  onclick="download('sem${currentSem}/${currentType}/slides/${subject}')">
  🎞 Slides
  </div>

  <div class="card"
  onclick="download('sem${currentSem}/${currentType}/notes/${subject}')">
  📝 Notes
  </div>

  <button onclick="openExam('${currentType}')">Back</button>
  `;

  show(html);
}
function download(key){
  window.open(`https://t.me/Rakibspersonalresourcesbot?start=${key}`,'_blank');
}
